<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototypes — Webflow Lab</title>
  <meta name="description" content="Prototype gallery for client previews.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #06060b;
      --bg-secondary: #0d0d15;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --text-primary: #f0f0f5;
      --text-secondary: rgba(240, 240, 245, 0.55);
      --text-tertiary: rgba(240, 240, 245, 0.3);
      --accent: #7c6aff;
      --accent-soft: rgba(124, 106, 255, 0.12);
      --accent-glow: rgba(124, 106, 255, 0.25);
      --green: #34d399;
      --green-soft: rgba(52, 211, 153, 0.1);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Ambient glow ── */
    .ambient {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
    }
    .ambient--purple {
      background: var(--accent);
      top: -200px;
      right: -100px;
    }
    .ambient--blue {
      background: #3b82f6;
      bottom: -300px;
      left: -200px;
    }

    /* ═══════════════════════════════════
       MAIN CONTENT
    ═══════════════════════════════════ */
    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 32px;
    }

    /* ── Header ── */
    header {
      padding: 40px 0;
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #3b82f6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.875rem;
      color: #fff;
    }
    .logo-text {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .logo-text span {
      color: var(--text-tertiary);
      font-weight: 400;
      margin-left: 8px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      background: var(--green-soft);
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid rgba(52, 211, 153, 0.12);
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse-dot 2s ease infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .project-count {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }
    .logout-link {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    .logout-link:hover {
      color: var(--text-secondary);
      border-color: var(--border-hover);
    }

    /* ── Content ── */
    .content {
      padding: 56px 0 80px;
    }
    .content-header {
      margin-bottom: 48px;
    }
    .content-header h2 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }
    .content-header p {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 540px;
    }

    /* ── Project Grid ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      text-decoration: none;
      color: inherit;
      transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .project-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .project-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
    }
    .project-card:hover::after { transform: translateX(-50%) scaleX(1); }

    .project-card__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .project-card__icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--accent-soft);
      border: 1px solid rgba(124, 106, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.125rem;
    }
    .project-card__arrow {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .project-card:hover .project-card__arrow {
      background: var(--accent-soft);
      transform: translate(2px, -2px);
    }
    .project-card__arrow svg {
      width: 14px;
      height: 14px;
      stroke: var(--text-tertiary);
      fill: none;
      stroke-width: 2;
      transition: stroke 0.2s ease;
    }
    .project-card:hover .project-card__arrow svg { stroke: var(--accent); }

    .project-card__title {
      font-size: 1.0625rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .project-card__desc {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.55;
      flex: 1;
      margin-bottom: 20px;
    }

    .project-card__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .project-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      font-size: 0.6875rem;
      font-family: var(--mono);
      padding: 4px 10px;
      border-radius: var(--radius-xs);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-tertiary);
      letter-spacing: 0.02em;
    }
    .project-card__date {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 80px 32px;
      color: var(--text-tertiary);
    }
    .empty-state svg {
      width: 48px;
      height: 48px;
      stroke: var(--text-tertiary);
      fill: none;
      stroke-width: 1;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    .empty-state p {
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
    }
    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }
    .footer-inner a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .footer-inner a:hover { color: var(--accent); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .container { padding: 0 20px; }
      header { padding: 28px 0; }
      .header-inner { flex-direction: column; align-items: flex-start; gap: 12px; }
      .content { padding: 40px 0 60px; }
      .content-header h2 { font-size: 1.5rem; }
      .projects-grid { grid-template-columns: 1fr; }
    }

    /* ── Loading skeleton ── */
    .skeleton-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      animation: skeleton-pulse 1.8s ease infinite;
    }
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .skeleton-bar {
      height: 12px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.05);
    }
    .skeleton-bar--lg { width: 60%; height: 16px; margin-bottom: 12px; }
    .skeleton-bar--md { width: 90%; margin-bottom: 8px; }
    .skeleton-bar--sm { width: 40%; }
    .skeleton-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      margin-bottom: 20px;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Ambient background glows -->
  <div class="ambient ambient--purple"></div>
  <div class="ambient ambient--blue"></div>

  <!-- ═══════════════════════════════════
       MAIN APP
  ═══════════════════════════════════ -->
  <header>
    <div class="container header-inner">
      <div class="logo">
        <div class="logo-mark">W</div>
        <div class="logo-text">Webflow Lab <span>Prototypes</span></div>
      </div>
      <div class="header-meta">
        <div class="status-badge">
          <div class="status-dot"></div>
          Live
        </div>
        <div class="project-count" id="project-count">—</div>
        <a href="/api/logout" class="logout-link">Sign out</a>
      </div>
    </div>
  </header>

  <main class="content">
    <div class="container">
      <div class="content-header">
        <h1>Projects</h1>
        <p>Select a prototype to preview. Each project runs independently in its own directory.</p>
      </div>

      <div class="projects-grid" id="projects-grid">
        <!-- Skeleton loaders shown while fetching -->
        <div class="skeleton-card">
          <div class="skeleton-icon"></div>
          <div class="skeleton-bar skeleton-bar--lg"></div>
          <div class="skeleton-bar skeleton-bar--md"></div>
          <div class="skeleton-bar skeleton-bar--sm"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-icon"></div>
          <div class="skeleton-bar skeleton-bar--lg"></div>
          <div class="skeleton-bar skeleton-bar--md"></div>
          <div class="skeleton-bar skeleton-bar--sm"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container footer-inner">
      <span>&copy; <span id="year"></span> Webflow Lab</span>
      <a href="https://github.com/danwykesdev/Webflow-Prototypes" target="_blank" rel="noopener">GitHub</a>
    </div>
  </footer>

  <script>
    /* ── Year ── */
    document.getElementById('year').textContent = new Date().getFullYear();

    /* ── Elements ── */
    const grid    = document.getElementById('projects-grid');
    const countEl = document.getElementById('project-count');

    /* ──────────────────────────────────────
       PROJECTS — Auto-loaded from manifest
    ────────────────────────────────────── */
    async function loadProjects() {
      try {
        const res = await fetch('/projects.json?v=' + Date.now());
        if (!res.ok) throw new Error('Failed to fetch');
        const projects = await res.json();

        countEl.textContent = `${projects.length} project${projects.length !== 1 ? 's' : ''}`;

        if (projects.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
              </svg>
              <p>No prototypes yet.<br>Add a folder and update <code>projects.json</code>.</p>
            </div>
          `;
          return;
        }

        // Sort by date descending
        projects.sort((a, b) => new Date(b.date) - new Date(a.date));

        grid.innerHTML = projects.map((p, i) => {
          const initials = p.title.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
          const dateStr  = new Date(p.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
          const tags     = (p.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
          const delay    = i * 60;

          return `
            <a href="/${p.slug}/" class="project-card" style="animation: card-in 0.5s ${delay}ms cubic-bezier(0.16, 1, 0.3, 1) both;">
              <div class="project-card__header">
                <div class="project-card__icon">${initials}</div>
                <div class="project-card__arrow">
                  <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
                </div>
              </div>
              <div class="project-card__title">${p.title}</div>
              <div class="project-card__desc">${p.description}</div>
              <div class="project-card__footer">
                <div class="project-card__tags">${tags}</div>
                <div class="project-card__date">${dateStr}</div>
              </div>
            </a>
          `;
        }).join('');

      } catch (err) {
        console.error('Error loading projects:', err);
        grid.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p>Failed to load projects.<br>Check that <code>projects.json</code> exists at the root.</p>
          </div>
        `;
      }
    }

    loadProjects();
  </script>

</body>
</html>
